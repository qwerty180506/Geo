name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.x'

      - name: Run convert script
        env:
          SECRET_JSON_URL: ${{ secrets.SECRET_JSON_URL }}
        run: |
          if [ -z "$SECRET_JSON_URL" ]; then
            echo "ERROR: SECRET_JSON_URL is empty!"
            exit 1
          fi
          python jio.py --url "$SECRET_JSON_URL"
          echo "--- Workspace contents ---"
          ls -la $GITHUB_WORKSPACE/
          if [ ! -f playlist.m3u ]; then
            echo "ERROR: playlist.m3u was not generated!"
            exit 1
          fi
          echo "--- First 10 lines of playlist ---"
          head -10 playlist.m3u

      - name: Commit and push changes
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u
          echo "--- Git status ---"
          git status
          echo "--- Git diff ---"
          git diff --staged
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist.m3u"
          git push
